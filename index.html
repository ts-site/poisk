<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Проверка</title>
  <style>
    body {
      margin:0;
      background:#0f172a;
      color:#fff;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .box {
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      width:420px;
    }
    input,button {
      width:100%;
      padding:12px;
      margin:6px 0;
      border:none;
      border-radius:8px;
    }
    input {background:#334155;color:#fff;}
    button {background:#3b82f6;color:#fff;cursor:pointer;}
    .result {
      margin-top:10px;
      background:#020617;
      padding:12px;
      border-radius:8px;
      min-height:60px;
    }
    .phone {
      font-size:20px;
      color:#22c55e;
      margin-top:10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Проверка</h2>

  <input id="query" placeholder="Иванов Иван Иванович 01.01.2000">
  <button onclick="search()">Начать проверку</button>

  <div class="result" id="res">Ожидание...</div>
</div>

<script>
const API_TOKEN = "xxR9d7dbZKtAitM6O1jQYijVNsKtA32";
const BASE_URL = "https://infoapi24.store";

async function search(){
  const q = document.getElementById("query").value.trim();
  const res = document.getElementById("res");

  if(!q){
    res.textContent = "Введи данные";
    return;
  }

  const parts = q.split(" ");
  const birth = parts.pop();
  const fio = parts.join(" ");

  res.textContent = "Поиск...";

  try{
    const url = `${BASE_URL}/api/${API_TOKEN}/phone_by_name/${encodeURIComponent(fio)}/${encodeURIComponent(birth)}`;
    const r = await fetch(url);
    const data = await r.json();

    if(data.result){
      res.innerHTML = `
        Найден номер:
        <div class="phone">${data.result}</div>
      `;
    } else if(data.error){
      res.textContent = "Ошибка: " + data.error;
    } else {
      res.textContent = JSON.stringify(data);
    }

  }catch(e){
    res.textContent = "Ошибка: " + e.message;
  }
}
</script>

</body>
</html>
