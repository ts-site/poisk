<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 0;
      color: #333;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      background: #fff;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .result {
      margin-top: 20px;
    }

    .card {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
    }

    .value {
      font-size: 24px;
      font-weight: bold;
      color: #007bff;
    }

    .error {
      color: red;
      text-align: center;
    }

    .loading {
      text-align: center;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Проверка</h1>

    <label>ФИО + ДР</label>
    <input type="text" id="fio" placeholder="Иванов Иван Иванович 01.01.1990" />

    <label>Номер</label>
    <input type="text" id="phone" placeholder="79991234567" />

    <button onclick="searchData()">Проверить</button>

    <div id="result" class="result"></div>
  </div>

  <script>
    const API_TOKEN = "xxR9d7dbZKtAitM6O1jQYijVNsKtA32";
    const baseUrl = "https://infoapi24.store";

    async function searchData() {
      const fio = document.getElementById("fio").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const resultBox = document.getElementById("result");

      if (!fio && !phone) {
        resultBox.innerHTML = '<div class="error">Заполните хотя бы одно поле</div>';
        return;
      }

      const query = `${fio} ${phone}`.trim();
      const encodedQuery = encodeURIComponent(query);

      const targetUrl = `${baseUrl}/api/${API_TOKEN}/search/${encodedQuery}`;
      const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

      resultBox.innerHTML = '<div class="loading">Загрузка...</div>';

      try {
        const response = await fetch(url);
        const text = await response.text();
        let data;

        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Неверный ответ API");
        }

        if (data.result) {
          resultBox.innerHTML = `
            <div class="card">
              <div class="title">Результат</div>
              <div class="value">${data.result}</div>
            </div>
          `;
        } else {
          resultBox.innerHTML = '<div class="error">Нет данных</div>';
        }

      } catch (error) {
        resultBox.innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
