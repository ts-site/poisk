<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка</title>
<style>
*{box-sizing:border-box}
:root{
  --bg:#f3f4f6; --panel:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
  --blue:#1780f2; --dark:#1f1f22; --card:#f8fafc; --danger:#b42318;
  --danger-bg:#fef3f2; --danger-border:#fecdca;
}
body{margin:0;padding:16px;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
.wrap{max-width:460px;margin:0 auto}
.admin-btn{width:100%;border:none;border-radius:16px;background:var(--dark);color:#fff;padding:16px 18px;font-size:16px;cursor:pointer;margin-bottom:14px}
.container{background:var(--panel);border-radius:24px;padding:22px 18px 18px;box-shadow:0 8px 28px rgba(0,0,0,.06)}
h2{margin:4px 0 18px;font-size:32px;line-height:1.1}
input,button{width:100%;font-size:16px;border-radius:16px}
input{padding:18px 16px;border:2px solid #d9d9de;background:#fff;margin-top:12px;outline:none}
input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(23,128,242,.12)}
.action-btn{margin-top:14px;padding:18px 16px;border:none;background:var(--blue);color:#fff;cursor:pointer}
#result{margin-top:16px;overflow:hidden}
.status{border-radius:16px;padding:14px 15px;border:1px solid var(--border);background:#fff;word-break:break-word;overflow-wrap:anywhere}
.status.error{color:var(--danger);background:var(--danger-bg);border-color:var(--danger-border)}
.status.loading{color:#0f6ad0;background:#eff6ff;border-color:#bfdbfe}
.source-badge{display:inline-block;margin-bottom:10px;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700}
.summary,.field,.result-card{background:#fff;border:1px solid var(--border);border-radius:14px}
.summary,.result-card{padding:12px}
.summary{margin-bottom:12px}
.summary h3{margin:0 0 10px;font-size:18px}
.result-list{display:flex;flex-direction:column;gap:12px}
.result-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px}
.field{padding:12px;margin-top:10px}
.field:first-child{margin-top:0}
.label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.value{font-size:16px;line-height:1.45;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);padding:16px}
.modal.show{display:flex}
.box{width:100%;max-width:420px;background:#fff;border-radius:20px;padding:18px;box-shadow:0 18px 40px rgba(0,0,0,.16)}
.box h3{margin:0 0 8px;font-size:24px}
.row{display:flex;gap:10px;margin-top:14px}
.secondary-btn{background:#eef0f3;color:#111827;border:none;cursor:pointer}
.note{margin-top:10px;color:var(--muted);font-size:12px;line-height:1.4}
.small-list{margin-top:12px;max-height:180px;overflow:auto;border:1px solid var(--border);border-radius:12px;background:#fff}
.small-item{padding:10px 12px;border-bottom:1px solid var(--border);font-size:14px}
.small-item:last-child{border-bottom:none}
@media (max-width:420px){body{padding:12px}.container{padding:18px 14px 14px}h2{font-size:28px}.row{flex-direction:column}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <button class="admin-btn" onclick="openAdmin()">Админ панель</button>

  <div class="container">
    <h2>Проверка</h2>
    <input id="accessKey" placeholder="Ключ доступа">
    <input id="queryInput" placeholder="Введите номер или запрос">
    <button class="action-btn" onclick="searchData()">Проверить</button>
    <div id="result"></div>
  </div>
</div>

<div id="admin" class="modal" onclick="backdropClose(event)">
  <div class="box">
    <h3>Админка</h3>
    <input id="adminPass" placeholder="Пароль">
    <input id="newKey" placeholder="Ключ">
    <input id="limit" placeholder="Лимит">
    <div class="row">
      <button class="action-btn" onclick="createKey()">Создать ключ</button>
      <button class="secondary-btn" onclick="closeAdmin()">Закрыть</button>
    </div>
    <div class="note">Ключи сохраняются в Firebase.</div>
    <div class="small-list" id="keyList"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, query, limit as fsLimit } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyAElkqoZjawZLjRkycz4cdXnJvkwUTpRgs",
  authDomain:"my-check-site.firebaseapp.com",
  projectId:"my-check-site",
  storageBucket:"my-check-site.firebasestorage.app",
  messagingSenderId:"636214966066",
  appId:"1:636214966066:web:1ca277c658d370fdc6092b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const _a = ['TGE=', 'bWFu', 'cGFpcw=='];
const ADMIN = atob(_a[0]) + atob(_a[1]) + atob(_a[2]);
const WORKER_URL = "https://flat-lab-a19bkakalsldmdks.db6df6cf4f.workers.dev/";

window.openAdmin = function(){ document.getElementById("admin").classList.add("show"); loadKeys(); };
window.closeAdmin = function(){ document.getElementById("admin").classList.remove("show"); };
window.backdropClose = function(event){ if(event.target.id === "admin") closeAdmin(); };

function escapeHtml(v){
  return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}

window.createKey = async function(){
  const pass = document.getElementById("adminPass").value.trim();
  if(pass !== ADMIN) return alert("неверный пароль");

  const key = document.getElementById("newKey").value.trim();
  const lim = Number(document.getElementById("limit").value);

  if(!key) return alert("введите ключ");
  if(!Number.isFinite(lim) || lim < 1) return alert("введите нормальный лимит");

  await setDoc(doc(db, "keys", key), { limit: lim, used: 0, createdAt: Date.now() });
  alert("ключ создан");
  document.getElementById("newKey").value = "";
  document.getElementById("limit").value = "";
  loadKeys();
};

async function loadKeys(){
  const box = document.getElementById("keyList");
  box.innerHTML = '<div class="small-item">Загрузка ключей...</div>';
  try{
    const snap = await getDocs(query(collection(db, "keys"), fsLimit(20)));
    if(snap.empty){ box.innerHTML = '<div class="small-item">Ключей пока нет</div>'; return; }
    let html = "";
    snap.forEach(docSnap => {
      const d = docSnap.data() || {};
      html += `<div class="small-item"><b>${escapeHtml(docSnap.id)}</b><br>лимит: ${escapeHtml(d.limit ?? 0)} / использовано: ${escapeHtml(d.used ?? 0)}</div>`;
    });
    box.innerHTML = html;
  }catch(e){
    box.innerHTML = '<div class="small-item">Не удалось загрузить ключи</div>';
  }
}

async function checkKey(key){
  const ref = doc(db, "keys", key);
  const snap = await getDoc(ref);
  if(!snap.exists()) return { ok:false, msg:"нет ключа" };
  const d = snap.data();
  const used = Number(d.used || 0);
  const limit = Number(d.limit || 0);
  if(used >= limit) return { ok:false, msg:"лимит" };
  await updateDoc(ref, { used: used + 1 });
  return { ok:true };
}

function prettyLabel(key){ return String(key).replaceAll("_"," ").replace(/\b\w/g, m => m.toUpperCase()); }
function isPlainObject(v){ return v !== null && typeof v === "object" && !Array.isArray(v); }

function prettyValue(v){
  if (v === null || v === undefined) return '<div class="value">—</div>';
  if (Array.isArray(v)) return `<div class="value">${escapeHtml(v.join(", "))}</div>`;
  if (typeof v === "object") return `<div class="value">${escapeHtml(JSON.stringify(v))}</div>`;
  return `<div class="value">${escapeHtml(String(v).trim() || "—")}</div>`;
}

function renderObjectCard(obj, index){
  const fields = Object.entries(obj).map(([k,v]) => `
    <div class="field">
      <div class="label">${escapeHtml(prettyLabel(k))}</div>
      ${k === "database" ? `<div class="value"><span class="badge">${escapeHtml(String(v))}</span></div>` : prettyValue(v)}
    </div>
  `).join("");

  return `<div class="result-card"><div class="result-title">Запись ${index + 1}</div>${fields}</div>`;
}

function renderSummary(data){
  const p = data.phone_info || {};
  const first = Array.isArray(data.results) && data.results[0] ? data.results[0] : null;
  if (!Object.keys(p).length && !first) return "";

  let blocks = "";
  if (Object.keys(p).length) {
    blocks += `
      <div class="field"><div class="label">Телефон</div><div class="value">${escapeHtml(p.phone || "—")}</div></div>
      <div class="field"><div class="label">Оператор</div><div class="value">${escapeHtml(p.operator || "—")}</div></div>
      <div class="field"><div class="label">Регион</div><div class="value">${escapeHtml(p.region || "—")}</div></div>
      <div class="field"><div class="label">Локальное время</div><div class="value">${escapeHtml(p.local_time || "—")}</div></div>
    `;
  }
  if (first && isPlainObject(first)) {
    ["name","full_name","fio","email","phone","address","city","birth_date","birthday","dob","bday"].forEach(k => {
      if (first[k] !== undefined && first[k] !== null && String(first[k]).trim() !== "") {
        blocks += `<div class="field"><div class="label">${escapeHtml(prettyLabel(k))}</div>${prettyValue(first[k])}</div>`;
      }
    });
  }
  return `<div class="summary"><h3>Кратко</h3><div class="grid">${blocks}</div></div>`;
}

function renderPayload(payload){
  const source = payload.source ? `<div class="source-badge">Источник: ${escapeHtml(payload.source)}</div>` : "";
  const data = payload.data ?? payload;

  if (isPlainObject(data) && Array.isArray(data.results)) {
    const cards = data.results.map((item, i) => isPlainObject(item) ? renderObjectCard(item, i) : `<div class="result-card">${prettyValue(item)}</div>`).join("");
    return source + renderSummary(data) + `<div class="result-list">${cards}</div>`;
  }

  if (isPlainObject(data) && Array.isArray(data.result)) {
    const cards = data.result.map((item, i) => isPlainObject(item) ? renderObjectCard(item, i) : `<div class="result-card">${prettyValue(item)}</div>`).join("");
    return source + `<div class="result-list">${cards}</div>`;
  }

  if (Array.isArray(data)) {
    const cards = data.map((item, i) => isPlainObject(item) ? renderObjectCard(item, i) : `<div class="result-card">${prettyValue(item)}</div>`).join("");
    return source + `<div class="result-list">${cards}</div>`;
  }

  if (isPlainObject(data)) return source + `<div class="result-list">${renderObjectCard(data, 0)}</div>`;
  return source + `<div class="result-card">${prettyValue(data)}</div>`;
}

window.searchData = async function(){
  const key = document.getElementById("accessKey").value.trim();
  const q = document.getElementById("queryInput").value.trim();
  const r = document.getElementById("result");

  if (!key) { r.innerHTML = '<div class="status error">Введите ключ доступа</div>'; return; }
  if (!q) { r.innerHTML = '<div class="status error">Введите запрос</div>'; return; }

  try{
    const c = await checkKey(key);
    if (!c.ok) { r.innerHTML = `<div class="status error">${escapeHtml(c.msg)}</div>`; return; }
  }catch(e){
    r.innerHTML = '<div class="status error">Ошибка проверки ключа</div>'; return;
  }

  r.innerHTML = '<div class="status loading">Загрузка...</div>';

  try{
    const res = await fetch(WORKER_URL + "?q=" + encodeURIComponent(q));
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch { data = text; }

    if (!res.ok || (data && typeof data === "object" && data.error)) {
      r.innerHTML = `<div class="status error">${escapeHtml(data?.error || "Ошибка запроса")}</div>`;
      return;
    }

    r.innerHTML = renderPayload(data);
  }catch(e){
    r.innerHTML = '<div class="status error">Ошибка при запросе</div>';
  }
};
</script>
</body>
</html>
