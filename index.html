<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 500px;
      margin: 60px auto;
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .error {
      color: red;
    }
    .loading {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Проверка</h1>

    <label for="fio">ФИО + ДР</label>
    <input type="text" id="fio" placeholder="Например: Иванов Иван Иванович 01.01.1990" />

    <label for="phone">Номер</label>
    <input type="text" id="phone" placeholder="Например: 79991234567" />

    <button onclick="searchData()">Проверить</button>

    <div id="result" class="result">Здесь будет результат...</div>
  </div>

  <script>
    const API_TOKEN = "xxR9d7dbZKtAitM6O1jQYijVNsKtA32";
    const baseUrl = "https://infoapi24.store";

    async function searchData() {
      const fio = document.getElementById("fio").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const resultBox = document.getElementById("result");

      if (!fio && !phone) {
        resultBox.innerHTML = '<span class="error">Заполните хотя бы одно поле.</span>';
        return;
      }

      const query = `${fio} ${phone}`.trim();
      const encodedQuery = encodeURIComponent(query);

      const targetUrl = `${baseUrl}/api/${API_TOKEN}/search/${encodedQuery}`;
      const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

      resultBox.innerHTML = '<span class="loading">Загрузка...</span>';

      try {
        const response = await fetch(url, { method: "GET" });

        if (!response.ok) {
          throw new Error(`Ошибка HTTP: ${response.status}`);
        }

        const text = await response.text();

        try {
          const data = JSON.parse(text);
          resultBox.textContent = JSON.stringify(data, null, 2);
        } catch {
          resultBox.textContent = text;
        }
      } catch (error) {
        resultBox.innerHTML = `<span class="error">Ошибка запроса: ${error.message}</span>`;
      }
    }
  </script>
</body>
</html>
