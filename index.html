<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px;}
.container{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:12px;}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
button{background:#007bff;color:#fff;border:none;}
.card{margin-top:15px;padding:15px;background:#f9f9f9;border-radius:10px;}
</style>
</head>
<body>
<div class="container">
<h2>Проверка</h2>

<input id="fio" placeholder="ФИО + ДР">
<input id="phone" placeholder="Номер">
<button onclick="searchData()">Проверить</button>

<div id="result"></div>
</div>

<script>
const API_TOKEN = "xxR9d7dbZKtAitM6O1jQYijVNsKtA32";
const baseUrl = "https://infoapi24.store";

function fix(obj){
  if(typeof obj === "object" && obj !== null){
    return Object.values(obj).map(v => fix(v)).join(" ");
  }
  return obj;
}

async function searchData(){
  const fio = document.getElementById("fio").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const resultBox = document.getElementById("result");

  const query = `${fio} ${phone}`.trim();
  const targetUrl = `${baseUrl}/api/${API_TOKEN}/search/${encodeURIComponent(query)}`;
  const url = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

  resultBox.innerHTML = "Загрузка...";

  try{
    const res = await fetch(url);
    const text = await res.text();
    const data = JSON.parse(text);

    if(Array.isArray(data)){
      resultBox.innerHTML = data.map(item=>`
        <div class="card">${fix(item)}</div>
      `).join('');
    }else{
      resultBox.innerHTML = `<div class="card">${fix(data)}</div>`;
    }

  }catch(e){
    resultBox.innerHTML = "Ошибка";
  }
}
</script>
</body>
</html>
