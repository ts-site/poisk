<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Проверка</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px;}
.container{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:12px;}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;}
button{background:#007bff;color:#fff;border:none;}
.card{margin-top:15px;padding:15px;background:#f9f9f9;border-radius:10px;}
.title{font-size:14px;color:#777;margin-bottom:5px;}
.value{font-size:18px;font-weight:bold;color:#007bff;}
</style>
</head>
<body>

<div class="container">
<h2>Проверка</h2>

<input id="accessKey" placeholder="Ключ доступа">
<input id="queryInput" placeholder="Введите запрос">

<button onclick="searchData()">Проверить</button>

<div id="result"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAElkqoZjawZLjRkycz4cdXnJvkwUTpRgs",
  authDomain: "my-check-site.firebaseapp.com",
  projectId: "my-check-site",
  storageBucket: "my-check-site.firebasestorage.app",
  messagingSenderId: "636214966066",
  appId: "1:636214966066:web:1ca277c658d370fdc6092b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function render(obj){
  if(typeof obj !== "object") return obj;

  return Object.entries(obj).map(([k,v])=>{
    if(typeof v === "object") v = JSON.stringify(v);
    return `<div class="card">
      <div class="title">${k}</div>
      <div class="value">${v}</div>
    </div>`;
  }).join('');
}

async function checkKey(key){
  const ref = doc(db,"keys",key);
  const snap = await getDoc(ref);

  if(!snap.exists()) return {ok:false,msg:"Неверный ключ"};

  const data = snap.data();

  if(data.used >= data.limit) return {ok:false,msg:"Лимит закончился"};

  await updateDoc(ref,{used:data.used+1});

  return {ok:true};
}

window.searchData = async function(){
  const key = document.getElementById("accessKey").value.trim();
  const query = document.getElementById("queryInput").value.trim();
  const result = document.getElementById("result");

  if(!key) return result.innerHTML="Введи ключ";
  if(!query) return result.innerHTML="Введи запрос";

  const check = await checkKey(key);
  if(!check.ok) return result.innerHTML=check.msg;

  const url = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://infoapi24.store/api/xxR9d7dbZKtAitM6O1jQYijVNsKtA32/search/"+encodeURIComponent(query));

  result.innerHTML="Загрузка...";

  try{
    const res = await fetch(url);
    const text = await res.text();
    let data;

    try{ data = JSON.parse(text);}catch{ data=text;}

    if(typeof data === "object"){
      result.innerHTML = render(data);
    }else{
      result.innerHTML = '<div class="card">'+data+'</div>';
    }

  }catch{
    result.innerHTML="Ошибка запроса";
  }
}
</script>

</body>
</html>
